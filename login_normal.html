<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dadlı Süfrə — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;0,900;1,500;1,600&family=Work+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2a1e17;
  --ink-soft:#3a2a20;
  --ink-line: rgba(244,233,216,.12);
  --parchment:#f4e9d8;
  --pomegranate:#b3422b;
  --saffron:#d6a23f;
  --teal:#4d6b63;
  --olive:#8c7f50;
  --muted:#aa9883;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Work Sans',sans-serif;background:var(--ink);color:var(--parchment);font-size:16px;line-height:1.7;min-height:100vh;}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;}
.login-card{position:relative;background:var(--ink-soft);padding:50px 44px 44px;border-radius:24px;width:min(460px,100%);box-shadow:0 32px 80px rgba(0,0,0,.26);}
.login-card::before{content:'';position:absolute;top:-32px;right:-32px;width:120px;height:120px;background:var(--pomegranate);border-radius:50% 15% 50% 50%;opacity:.12;transform:rotate(28deg);}
.tag{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--saffron);display:inline-flex;align-items:center;gap:10px;margin-bottom:24px;}
.buta-mark{width:10px;height:12px;border-radius:0 50% 50% 50%;transform:rotate(45deg);display:inline-block;flex-shrink:0;position:relative;top:2px;background:var(--saffron);}
h1{font-family:'Fraunces',serif;font-size:42px;font-weight:700;line-height:1.05;margin-bottom:12px;}
h1 em{display:block;font-style:italic;color:var(--saffron);}
p{color:var(--muted);margin-bottom:30px;max-width:360px;}
.form-group{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.form-group label{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.form-group input{background:transparent;border:none;border-bottom:1px solid var(--ink-line);padding:14px 0;color:var(--parchment);font-family:'Work Sans',sans-serif;font-size:15px;}
.form-group input:focus{outline:none;border-color:var(--saffron);}
.form-group input::placeholder{color:var(--muted);}
.btn{display:inline-block;padding:14px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--parchment);transition:.25s;cursor:pointer;text-align:center;width:100%;}
.btn-primary{background:var(--pomegranate);border-color:var(--pomegranate);color:var(--parchment);}
.btn-primary:hover{background:transparent;color:var(--pomegranate);}
@media(max-width:500px){.login-card{padding:36px 28px;}}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <span class="tag"><span class="buta-mark"></span>Qonaq Girişi</span>
    <h1>Dadlı<em>Süfrə</em></h1>
    <p>Ənənəvi ləzzətlərlə dolu süfrənin qapısını açmaq üçün hesabınıza daxil olun.</p>
    <form action="success.html" method="get">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Email">
      </div>
      <div class="form-group">
        <label for="password">Şifrə</label>
        <input id="password" name="password" type="password" placeholder="Şifrə">
      </div>
      <button type="submit" class="btn btn-primary">Giriş et</button>
    </form>
  </div>
</div>
</body>
</html>
